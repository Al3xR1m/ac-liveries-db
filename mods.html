<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS Mods — AC Liveries DB</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo"><i class="ti ti-flag-3"></i>AC<span>Liveries</span>DB</a>
  <div class="nav-links">
    <a href="index.html">Gallery</a>
    <a href="mods.html" class="active">RSS Mods</a>
    <a href="submit.html">Submit</a>
  </div>
  <div class="nav-right">
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <i class="ti ti-sun" id="themeIcon"></i>
    </button>
    <a href="submit.html" class="nav-submit">+ Submit a livery</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <h1 class="page-title">RSS Mods</h1>
    <p class="page-sub">Browse liveries by Race Sim Studio mod. Click a mod to filter the gallery.</p>
  </div>

  <div id="mods-container" class="mods-grid">
    <div class="skeleton" style="height:130px;border-radius:10px"></div>
    <div class="skeleton" style="height:130px;border-radius:10px"></div>
    <div class="skeleton" style="height:130px;border-radius:10px"></div>
    <div class="skeleton" style="height:130px;border-radius:10px"></div>
    <div class="skeleton" style="height:130px;border-radius:10px"></div>
    <div class="skeleton" style="height:130px;border-radius:10px"></div>
  </div>
</div>

<script src="supabase.js"></script>
<script>
  // Theme
  const root = document.documentElement;
  const saved = localStorage.getItem('acliveries_theme') || 'dark';
  root.setAttribute('data-theme', saved);
  document.getElementById('themeIcon').className = saved === 'dark' ? 'ti ti-sun' : 'ti ti-moon';
  document.getElementById('themeToggle').addEventListener('click', () => {
    const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    root.setAttribute('data-theme', next);
    localStorage.setItem('acliveries_theme', next);
    document.getElementById('themeIcon').className = next === 'dark' ? 'ti ti-sun' : 'ti ti-moon';
  });

  const RSS_MODS = [
    { name: 'RSS Formula Hybrid 2024', cat: 'Formula', icon: 'ti-steering-wheel', url: 'https://www.racesimstudio.com' },
    { name: 'RSS Formula Hybrid 2022', cat: 'Formula', icon: 'ti-steering-wheel', url: 'https://www.racesimstudio.com' },
    { name: 'RSS Formula Hybrid 2021', cat: 'Formula', icon: 'ti-steering-wheel', url: 'https://www.racesimstudio.com' },
    { name: 'RSS Formula Hybrid 2020', cat: 'Formula', icon: 'ti-steering-wheel', url: 'https://www.racesimstudio.com' },
    { name: 'RSS Formula Hybrid 2019', cat: 'Formula', icon: 'ti-steering-wheel', url: 'https://www.racesimstudio.com' },
    { name: 'RSS Formula 2 V6',        cat: 'Formula', icon: 'ti-steering-wheel', url: 'https://www.racesimstudio.com' },
    { name: 'RSS Formula 3',           cat: 'Formula', icon: 'ti-steering-wheel', url: 'https://www.racesimstudio.com' },
    { name: 'RSS Formula 4',           cat: 'Formula', icon: 'ti-steering-wheel', url: 'https://www.racesimstudio.com' },
    { name: 'RSS GT3',                 cat: 'GT',      icon: 'ti-car',            url: 'https://www.racesimstudio.com' },
    { name: 'RSS GT Pack',             cat: 'GT',      icon: 'ti-car',            url: 'https://www.racesimstudio.com' },
    { name: 'RSS GT3 Legends',         cat: 'GT',      icon: 'ti-car',            url: 'https://www.racesimstudio.com' },
    { name: 'RSS Hillclimb',           cat: 'Hillclimb',icon:'ti-mountain',       url: 'https://www.racesimstudio.com' },
    { name: 'RSS Touring Cars',        cat: 'Touring', icon: 'ti-car-suv',        url: 'https://www.racesimstudio.com' },
    { name: 'RSS Touring Classics',    cat: 'Touring', icon: 'ti-car-suv',        url: 'https://www.racesimstudio.com' },
  ];

  async function init() {
    const liveries = await fetchLiveries({ sort: 'votes' });
    const counts = {};
    liveries.forEach(l => { counts[l.mod] = (counts[l.mod] || 0) + 1; });

    const container = document.getElementById('mods-container');
    container.innerHTML = RSS_MODS.map(m => `
      <div class="mod-card" onclick="location.href='index.html?mod=${encodeURIComponent(m.name)}'">
        <div class="mod-icon"><i class="ti ${m.icon}"></i></div>
        <div class="mod-name">${m.name}</div>
        <div class="mod-count">${counts[m.name] || 0} liveries available</div>
        <span class="cat-badge cat-${m.cat} mod-cat">${m.cat}</span>
      </div>`).join('');
  }

  init();
</script>
</body>
</html>
